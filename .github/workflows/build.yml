name: Build NeuroBoost

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-dsp-test:
    name: Build DSP Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup CMake (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake
    
    - name: Setup CMake (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake || true
    
    - name: Configure DSP Test
      run: |
        mkdir -p build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_DSP_TEST=ON -DBUILD_UI_TEST=ON -DBUILD_VST3=OFF -DBUILD_STANDALONE=OFF ..
    
    - name: Build DSP Test
      run: |
        cd build
        cmake --build . --config Release
    
    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure --build-config Release
    
    - name: Run sequencer tests manually
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./build/bin/Release/test_sequencer.exe
        else
          ./build/bin/test_sequencer
        fi

    - name: Run UI structure tests manually
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./build/bin/Release/test_ui_structure.exe
        else
          ./build/bin/test_ui_structure
        fi

    - name: Show UI structure in job summary
      if: always()
      shell: bash
      run: |
        if [ -f tests/screenshots/ui_structure_dump.txt ]; then
          echo '## UI Structure Dump' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat tests/screenshots/ui_structure_dump.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload UI structure artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ui-structure-${{ matrix.os }}
        path: tests/screenshots/
        if-no-files-found: ignore

  build-full-plugin:
    name: Build Full Plugin (Ubuntu)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake git \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
          libgl1-mesa-dev libfreetype6-dev libharfbuzz-dev \
          libasound2-dev libgtk-3-dev pkg-config
    
    - name: Clone iPlug2 + VST3 SDK
      shell: bash
      run: |
        set -e
        mkdir -p deps
        git clone https://github.com/iPlug2/iPlug2.git deps/iPlug2
        cd deps/iPlug2
        git checkout 3b32d40f2b2da1f64ce2e5a6552f5bde7c76f2b1
        cd ../..

        # Clone VST3 SDK directly — more reliable than submodule init
        VST3_SDK_DIR="deps/iPlug2/Dependencies/IPlug/VST3_SDK"
        mkdir -p "$(dirname "$VST3_SDK_DIR")"
        rm -rf "$VST3_SDK_DIR"
        git clone --branch v3.7.7_build_19 --depth 1 \
          https://github.com/steinbergmedia/vst3sdk.git "$VST3_SDK_DIR"
        git -C "$VST3_SDK_DIR" submodule update --init --recursive

        # Verify
        VST3_HEADER="$VST3_SDK_DIR/pluginterfaces/vst/ivstaudioprocessor.h"
        if [ ! -f "$VST3_HEADER" ]; then
          echo "::error::VST3 SDK header not found: $VST3_HEADER"
          exit 1
        fi
        echo "✅ VST3 SDK ready at $VST3_HEADER"
    
    - name: Clone Visage
      run: |
        cd deps
        git clone https://github.com/VitalAudio/visage.git
        cd visage
        git checkout b0b2ee89abb3f1173dad4d80460197eb96afa724
    
    - name: Build Visage
      run: |
        cd deps/visage
        mkdir -p build
        cd build
        cmake -DVISAGE_BUILD_EXAMPLES=OFF -DVISAGE_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release ..
        cmake --build . --config Release --parallel 2
    
    - name: Configure NeuroBoost
      run: |
        set -e
        # Verify VST3 SDK header is present before configuring
        VST3_HEADER="deps/iPlug2/Dependencies/IPlug/VST3_SDK/pluginterfaces/vst/ivstaudioprocessor.h"
        if [ ! -f "$VST3_HEADER" ]; then
          echo "::error::VST3 SDK header not found at $VST3_HEADER"
          exit 1
        fi
        # Verify Visage library was built
        VISAGE_LIB=$(find deps/visage/build -name "libvisage.a" 2>/dev/null | head -n 1)
        if [ -z "$VISAGE_LIB" ]; then
          echo "::error::Visage library not found under deps/visage/build/"
          exit 1
        fi
        echo "✅ Visage found: $VISAGE_LIB"
        echo "✅ VST3 SDK ready — building full plugin with BUILD_VST3=ON"
        mkdir -p build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_DSP_TEST=ON \
              -DBUILD_UI_TEST=ON \
              -DBUILD_VST3=ON \
              -DBUILD_STANDALONE=OFF \
              ..
    
    - name: Build NeuroBoost
      run: |
        cd build
        cmake --build . --config Release --parallel 2

    - name: Verify VST3 binary was produced
      shell: bash
      run: |
        set -e
        VST3_FILE=$(find build -type f \( -name "NeuroBoost.so" -o -name "NeuroBoost.vst3" \) 2>/dev/null | head -n 1)
        if [ -z "$VST3_FILE" ]; then
          echo "::error::No VST3 binary found in build/ — the build may have failed silently"
          find build -type f 2>/dev/null | head -20 || true
          exit 1
        fi
        echo "✅ VST3 binary found: $VST3_FILE"
    
    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure
