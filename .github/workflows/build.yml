name: Build NeuroBoost

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-dsp-test:
    name: Build DSP Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup CMake (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake
    
    - name: Setup CMake (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake || true
    
    - name: Configure DSP Test
      run: |
        mkdir -p build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_DSP_TEST=ON -DBUILD_UI_TEST=ON -DBUILD_VST3=OFF -DBUILD_STANDALONE=OFF ..
    
    - name: Build DSP Test
      run: |
        cd build
        cmake --build . --config Release
    
    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure --build-config Release
    
    - name: Run sequencer tests manually
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./build/bin/Release/test_sequencer.exe
        else
          ./build/bin/test_sequencer
        fi

    - name: Run UI structure tests manually
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./build/bin/Release/test_ui_structure.exe
        else
          ./build/bin/test_ui_structure
        fi

    - name: Show UI structure in job summary
      if: always()
      shell: bash
      run: |
        if [ -f tests/screenshots/ui_structure_dump.txt ]; then
          echo '## UI Structure Dump' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat tests/screenshots/ui_structure_dump.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload UI structure artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ui-structure-${{ matrix.os }}
        path: tests/screenshots/
        if-no-files-found: ignore

  build-full-plugin:
    name: Build Full Plugin (Ubuntu)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake git \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
          libgl1-mesa-dev libfreetype6-dev libharfbuzz-dev \
          libasound2-dev libgtk-3-dev pkg-config
    
    - name: Clone iPlug2
      run: |
        mkdir -p deps
        cd deps
        git clone --depth 1 --branch master https://github.com/iPlug2/iPlug2.git || \
          git clone https://github.com/iPlug2/iPlug2.git
        cd iPlug2
        git fetch --unshallow 2>/dev/null || true
        git checkout 3b32d40f2b2da1f64ce2e5a6552f5bde7c76f2b1
        git submodule update --init --recursive Dependencies/IPlug/VST3_SDK
    
    - name: Clone Visage
      run: |
        cd deps
        git clone https://github.com/VitalAudio/visage.git
        cd visage
        git checkout b0b2ee89abb3f1173dad4d80460197eb96afa724
    
    - name: Build Visage
      run: |
        cd deps/visage
        mkdir -p build
        cd build
        cmake -DVISAGE_BUILD_EXAMPLES=OFF -DVISAGE_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release ..
        cmake --build . --config Release --parallel 2
    
    - name: Configure NeuroBoost (DSP only if Visage failed)
      run: |
        mkdir -p build
        cd build
        VST3_HEADER="../deps/iPlug2/Dependencies/IPlug/VST3_SDK/public.sdk/source/vst/vstsinglecomponenteffect.h"
        if [ -f ../deps/visage/build/libvisage.a ] && [ -f "$VST3_HEADER" ]; then
          echo "Visage and VST3 SDK available, building full plugin..."
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_DSP_TEST=ON -DBUILD_UI_TEST=ON -DBUILD_VST3=ON -DBUILD_STANDALONE=ON ..
        elif [ -f ../deps/visage/build/libvisage.a ]; then
          echo "Visage available but VST3 SDK missing, building without VST3..."
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_DSP_TEST=ON -DBUILD_UI_TEST=ON -DBUILD_VST3=OFF -DBUILD_STANDALONE=OFF ..
        else
          echo "Visage not available, building DSP test only..."
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_DSP_TEST=ON -DBUILD_UI_TEST=ON -DBUILD_VST3=OFF -DBUILD_STANDALONE=OFF ..
        fi
    
    - name: Build NeuroBoost
      run: |
        cd build
        cmake --build . --config Release --parallel 2
    
    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure
