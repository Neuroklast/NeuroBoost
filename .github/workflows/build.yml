name: Build NeuroBoost

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake git libx11-dev libgl1-mesa-dev libasound2-dev libgtk-3-dev
    
    - name: Setup dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake
    
    - name: Clone dependencies
      shell: bash
      run: |
        mkdir -p deps
        cd deps
        git clone --recurse-submodules https://github.com/iPlug2/iPlug2.git || true
        git clone --recurse-submodules https://github.com/VitalAudio/visage.git || true
    
    - name: Build Visage
      shell: bash
      run: |
        cd deps/visage
        mkdir -p build
        cd build
        cmake -DVISAGE_BUILD_EXAMPLES=OFF -DVISAGE_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release ..
        cmake --build . --config Release
    
    - name: Configure NeuroBoost
      run: |
        mkdir -p build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
    
    - name: Build NeuroBoost
      run: |
        cd build
        cmake --build . --config Release
