name: Build NeuroBoost

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-dsp-test:
    name: Build DSP Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup CMake (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake
    
    - name: Setup CMake (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake || true
    
    - name: Configure DSP Test
      run: |
        mkdir -p build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_DSP_TEST=ON -DBUILD_VST3=OFF -DBUILD_STANDALONE=OFF ..
    
    - name: Build DSP Test
      run: |
        cd build
        cmake --build . --config Release
    
    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure --build-config Release
    
    - name: Run sequencer tests manually
      shell: bash
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./build/bin/Release/test_sequencer.exe
        else
          ./build/bin/test_sequencer
        fi

  build-full-plugin:
    name: Build Full Plugin (Ubuntu)
    runs-on: ubuntu-latest
    continue-on-error: true  # Visage build may fail due to dependencies
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake git \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
          libgl1-mesa-dev libfreetype6-dev libharfbuzz-dev \
          libasound2-dev libgtk-3-dev pkg-config
    
    - name: Clone iPlug2
      run: |
        mkdir -p deps
        cd deps
        git clone --depth 1 --recurse-submodules --shallow-submodules https://github.com/iPlug2/iPlug2.git
    
    - name: Clone Visage
      run: |
        cd deps
        git clone --depth 1 --recurse-submodules --shallow-submodules https://github.com/VitalAudio/visage.git
    
    - name: Build Visage
      continue-on-error: true
      run: |
        cd deps/visage
        mkdir -p build
        cd build
        cmake -DVISAGE_BUILD_EXAMPLES=OFF -DVISAGE_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release ..
        cmake --build . --config Release --parallel 2
    
    - name: Configure NeuroBoost (DSP only if Visage failed)
      run: |
        mkdir -p build
        cd build
        if [ -f ../deps/visage/build/libvisage.a ]; then
          echo "Visage built successfully, building full plugin..."
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_DSP_TEST=ON -DBUILD_VST3=ON -DBUILD_STANDALONE=ON ..
        else
          echo "Visage not available, building DSP test only..."
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_DSP_TEST=ON -DBUILD_VST3=OFF -DBUILD_STANDALONE=OFF ..
        fi
    
    - name: Build NeuroBoost
      run: |
        cd build
        cmake --build . --config Release --parallel 2
    
    - name: Run Tests
      run: |
        cd build
        ctest --output-on-failure
