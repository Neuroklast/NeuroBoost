name: Build NeuroBoost

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

# ============================================================================
# Shared constants used as cache keys
# ============================================================================
env:
  IPLUG2_COMMIT: "3b32d40f2b2da1f64ce2e5a6552f5bde7c76f2b1"
  VISAGE_COMMIT: "b0b2ee89abb3f1173dad4d80460197eb96afa724"

jobs:
  # ==========================================================================
  # 1. Lightweight DSP + UI structure tests – no external deps, fast feedback
  # ==========================================================================
  test-dsp:
    name: DSP & UI Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Setup build tools (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    - name: Setup build tools (macOS)
      if: runner.os == 'macOS'
      run: brew install cmake || true

    - name: Configure DSP/UI tests
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_DSP_TEST=ON \
          -DBUILD_UI_TEST=ON \
          -DBUILD_VST3=OFF \
          -DBUILD_STANDALONE=OFF
      shell: bash

    - name: Build
      run: cmake --build build --config Release
      shell: bash

    - name: Run CTest
      run: ctest --test-dir build --output-on-failure --build-config Release
      shell: bash

    - name: Run sequencer tests directly
      shell: bash
      run: |
        if [ "$RUNNER_OS" = "Windows" ]; then
          ./build/bin/Release/test_sequencer.exe
        else
          ./build/bin/test_sequencer
        fi

    - name: Run UI structure tests directly
      shell: bash
      run: |
        if [ "$RUNNER_OS" = "Windows" ]; then
          ./build/bin/Release/test_ui_structure.exe
        else
          ./build/bin/test_ui_structure
        fi

    - name: Show UI structure in job summary
      if: always()
      shell: bash
      run: |
        if [ -f tests/screenshots/ui_structure_dump.txt ]; then
          echo '## UI Structure Dump' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat tests/screenshots/ui_structure_dump.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload UI structure artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ui-structure-${{ matrix.os }}
        path: tests/screenshots/
        if-no-files-found: ignore

  # ==========================================================================
  # 2. Full VST3 build – macOS (Apple Silicon, macos-14)
  # ==========================================================================
  build-macos:
    name: Build VST3 (macOS)
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4

    - name: Install build tools
      run: brew install cmake || true

    # ── Cache deps ──────────────────────────────────────────────────────────
    - name: Cache iPlug2 + VST3 SDK
      id: cache-iplug2
      uses: actions/cache@v4
      with:
        path: deps/iPlug2
        key: iplug2-macos-${{ env.IPLUG2_COMMIT }}

    - name: Cache Visage build
      id: cache-visage
      uses: actions/cache@v4
      with:
        path: deps/visage
        key: visage-macos-${{ env.VISAGE_COMMIT }}

    # ── Clone iPlug2 + VST3 SDK ─────────────────────────────────────────────
    - name: Clone iPlug2 + VST3 SDK
      if: steps.cache-iplug2.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -e
        mkdir -p deps
        cd deps
        git clone https://github.com/iPlug2/iPlug2.git
        cd iPlug2
        git checkout ${{ env.IPLUG2_COMMIT }}
        git submodule update --init --recursive Dependencies/IPlug/VST3_SDK || true

        VST3_SDK_DIR="Dependencies/IPlug/VST3_SDK"
        VST3_HEADER="$VST3_SDK_DIR/pluginterfaces/vst/ivstaudioprocessor.h"
        if [ ! -f "$VST3_HEADER" ]; then
          echo "::warning::VST3 SDK submodule failed – cloning directly"
          rm -rf "$VST3_SDK_DIR"
          git clone --branch v3.7.7_build_19 --depth 1 \
            https://github.com/steinbergmedia/vst3sdk.git "$VST3_SDK_DIR"
          cd "$VST3_SDK_DIR" && git submodule update --init --recursive && cd ../..
        fi
        [ -f "$VST3_HEADER" ] || { echo "::error::VST3 SDK still missing"; exit 1; }
        echo "✅ VST3 SDK ready"

    # ── Clone + build Visage ────────────────────────────────────────────────
    - name: Clone Visage
      if: steps.cache-visage.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -e
        mkdir -p deps
        cd deps
        git clone https://github.com/VitalAudio/visage.git
        cd visage
        git checkout ${{ env.VISAGE_COMMIT }}

    - name: Build Visage
      if: steps.cache-visage.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -e
        cd deps/visage
        mkdir -p build && cd build
        cmake -DVISAGE_BUILD_EXAMPLES=OFF -DVISAGE_BUILD_TESTS=OFF \
              -DCMAKE_BUILD_TYPE=Release ..
        cmake --build . --config Release --parallel $(sysctl -n hw.logicalcpu)

    # ── Verify deps ─────────────────────────────────────────────────────────
    - name: Verify dependencies
      shell: bash
      run: |
        set -e
        [ -d deps/iPlug2 ] || { echo "::error::iPlug2 missing"; exit 1; }
        VST3_HEADER="deps/iPlug2/Dependencies/IPlug/VST3_SDK/pluginterfaces/vst/ivstaudioprocessor.h"
        [ -f "$VST3_HEADER" ] || { echo "::error::VST3 SDK header missing"; exit 1; }
        VISAGE_LIB=$(find deps/visage/build -name "libvisage.a" 2>/dev/null | head -1)
        [ -n "$VISAGE_LIB" ] || { echo "::error::libvisage.a not found"; find deps/visage/build -type f 2>/dev/null; exit 1; }
        echo "✅ All deps verified: $VISAGE_LIB"

    # ── Configure & build NeuroBoost ─────────────────────────────────────────
    - name: Configure NeuroBoost
      shell: bash
      run: |
        set -e
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_VST3=ON \
          -DBUILD_DSP_TEST=ON \
          -DBUILD_UI_TEST=ON \
          -DBUILD_STANDALONE=OFF \
          2>&1 | tee build-configure.log

    - name: Build NeuroBoost VST3
      shell: bash
      run: |
        set -e
        cmake --build build --config Release --parallel $(sysctl -n hw.logicalcpu) \
          2>&1 | tee build-compile.log

    - name: List build output
      if: always()
      shell: bash
      run: |
        echo "=== build/vst3/ ==="
        ls -laR build/vst3/ 2>/dev/null || echo "(not found)"
        echo "=== All plugin files ==="
        find build -type f \( -name "*.vst3" -o -name "*.dylib" -o -name "*.so" \) 2>/dev/null || echo "(none)"

    # ── Run tests ────────────────────────────────────────────────────────────
    - name: Run CTest
      shell: bash
      run: ctest --test-dir build --output-on-failure --build-config Release

    # ── Validate with pluginval ──────────────────────────────────────────────
    - name: Download pluginval (macOS)
      shell: bash
      run: |
        curl -fsSL \
          https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip \
          -o /tmp/pluginval.zip
        unzip -q /tmp/pluginval.zip -d /tmp/pluginval
        chmod +x /tmp/pluginval/pluginval.app/Contents/MacOS/pluginval
        echo "PLUGINVAL=/tmp/pluginval/pluginval.app/Contents/MacOS/pluginval" >> "$GITHUB_ENV"

    - name: Locate VST3 bundle
      id: vst3-path
      shell: bash
      run: |
        VST3=$(find build -name "NeuroBoost.vst3" -type d | head -1)
        [ -z "$VST3" ] && VST3=$(find build -name "NeuroBoost.vst3" | head -1)
        [ -n "$VST3" ] || { echo "::error::No NeuroBoost.vst3 found"; exit 1; }
        echo "path=$VST3" >> "$GITHUB_OUTPUT"
        echo "Found VST3 at: $VST3"

    - name: Run pluginval
      shell: bash
      # Software/noop renderer avoids GPU requirement in headless CI
      env:
        BGFX_DEFAULT_RENDERER: noop
      run: |
        mkdir -p pluginval-results
        "$PLUGINVAL" \
          --validate-in-process \
          --strictness-level 5 \
          --timeout-ms 120000 \
          --verbose \
          --output-dir ./pluginval-results \
          "${{ steps.vst3-path.outputs.path }}" \
          2>&1 | tee pluginval-results/pluginval-macos.log || true

    # ── UI screenshot note ───────────────────────────────────────────────────
    - name: UI screenshot note
      shell: bash
      run: |
        echo "ℹ️  Hardware GPU unavailable on macOS CI runner." >> "$GITHUB_STEP_SUMMARY"
        echo "   pluginval opens/closes the UI editor headlessly via Metal software rendering." >> "$GITHUB_STEP_SUMMARY"
        echo "   test_ui_structure validates all UI component layout correctness." >> "$GITHUB_STEP_SUMMARY"
        if [ -f tests/screenshots/ui_structure_dump.txt ]; then
          echo '## UI Structure Dump' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat tests/screenshots/ui_structure_dump.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        fi

    # ── Package VST3 as ZIP ──────────────────────────────────────────────────
    - name: Package VST3 ZIP (macOS)
      shell: bash
      run: |
        set -e
        mkdir -p dist
        VST3="${{ steps.vst3-path.outputs.path }}"
        cd "$(dirname "$VST3")"
        zip -r "$OLDPWD/dist/NeuroBoost-macos-arm64.vst3.zip" "$(basename "$VST3")"
        ls -lh "$OLDPWD/dist/"

    # ── Upload artifacts ─────────────────────────────────────────────────────
    - name: Upload VST3 ZIP
      uses: actions/upload-artifact@v4
      with:
        name: NeuroBoost-vst3-macos
        path: dist/NeuroBoost-macos-arm64.vst3.zip
        if-no-files-found: error

    - name: Upload pluginval logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pluginval-logs-macos
        path: pluginval-results/
        if-no-files-found: ignore

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-macos
        path: |
          build-configure.log
          build-compile.log
        if-no-files-found: ignore

    - name: Collect macOS crash dumps
      if: always()
      shell: bash
      run: |
        CRASH_DIR="$HOME/Library/Logs/DiagnosticReports"
        mkdir -p crash-dumps-macos
        if [ -d "$CRASH_DIR" ]; then
          find "$CRASH_DIR" -name "*.crash" -newer build-configure.log \
               -exec cp {} crash-dumps-macos/ \; 2>/dev/null || true
          find "$CRASH_DIR" -name "*.ips" -newer build-configure.log \
               -exec cp {} crash-dumps-macos/ \; 2>/dev/null || true
        fi
        ls -la crash-dumps-macos/ || echo "(no crash dumps)"

    - name: Upload crash dumps
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: crash-dumps-macos
        path: crash-dumps-macos/
        if-no-files-found: ignore

  # ==========================================================================
  # 3. Full VST3 build – Windows (windows-latest, MSVC x64)
  # ==========================================================================
  build-windows:
    name: Build VST3 (Windows)
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # Set up MSVC environment (required for CMake/compiler to work correctly)
    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    # ── Cache deps ──────────────────────────────────────────────────────────
    - name: Cache iPlug2 + VST3 SDK
      id: cache-iplug2
      uses: actions/cache@v4
      with:
        path: deps/iPlug2
        key: iplug2-windows-${{ env.IPLUG2_COMMIT }}

    - name: Cache Visage build
      id: cache-visage
      uses: actions/cache@v4
      with:
        path: deps/visage
        key: visage-windows-${{ env.VISAGE_COMMIT }}

    # ── Clone iPlug2 + VST3 SDK ─────────────────────────────────────────────
    - name: Clone iPlug2 + VST3 SDK
      if: steps.cache-iplug2.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -e
        mkdir -p deps
        cd deps
        git clone https://github.com/iPlug2/iPlug2.git
        cd iPlug2
        git checkout ${{ env.IPLUG2_COMMIT }}
        git submodule update --init --recursive Dependencies/IPlug/VST3_SDK || true

        VST3_SDK_DIR="Dependencies/IPlug/VST3_SDK"
        VST3_HEADER="$VST3_SDK_DIR/pluginterfaces/vst/ivstaudioprocessor.h"
        if [ ! -f "$VST3_HEADER" ]; then
          echo "::warning::VST3 SDK submodule failed – cloning directly"
          rm -rf "$VST3_SDK_DIR"
          git clone --branch v3.7.7_build_19 --depth 1 \
            https://github.com/steinbergmedia/vst3sdk.git "$VST3_SDK_DIR"
          cd "$VST3_SDK_DIR" && git submodule update --init --recursive && cd ../..
        fi
        [ -f "$VST3_HEADER" ] || { echo "::error::VST3 SDK still missing"; exit 1; }
        echo "✅ VST3 SDK ready"

    # ── Clone + build Visage ────────────────────────────────────────────────
    - name: Clone Visage
      if: steps.cache-visage.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -e
        mkdir -p deps
        cd deps
        git clone https://github.com/VitalAudio/visage.git
        cd visage
        git checkout ${{ env.VISAGE_COMMIT }}

    - name: Build Visage
      if: steps.cache-visage.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -e
        cd deps/visage
        mkdir -p build && cd build
        cmake -DVISAGE_BUILD_EXAMPLES=OFF -DVISAGE_BUILD_TESTS=OFF \
              -DCMAKE_BUILD_TYPE=Release ..
        cmake --build . --config Release --parallel

    # ── Verify deps ─────────────────────────────────────────────────────────
    - name: Verify dependencies
      shell: bash
      run: |
        set -e
        [ -d deps/iPlug2 ] || { echo "::error::iPlug2 missing"; exit 1; }
        VST3_HEADER="deps/iPlug2/Dependencies/IPlug/VST3_SDK/pluginterfaces/vst/ivstaudioprocessor.h"
        [ -f "$VST3_HEADER" ] || { echo "::error::VST3 SDK header missing"; exit 1; }
        VISAGE_LIB=$(find deps/visage/build -name "visage.lib" 2>/dev/null | head -1)
        [ -n "$VISAGE_LIB" ] || VISAGE_LIB=$(find deps/visage/build -name "libvisage.a" 2>/dev/null | head -1)
        [ -n "$VISAGE_LIB" ] || { echo "::error::Visage lib not found"; find deps/visage/build -type f 2>/dev/null; exit 1; }
        echo "✅ All deps verified: $VISAGE_LIB"

    # ── Configure & build NeuroBoost ─────────────────────────────────────────
    - name: Configure NeuroBoost
      shell: bash
      run: |
        set -e
        cmake -B build \
          -A x64 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_VST3=ON \
          -DBUILD_DSP_TEST=ON \
          -DBUILD_UI_TEST=ON \
          -DBUILD_STANDALONE=OFF \
          2>&1 | tee build-configure.log

    - name: Build NeuroBoost VST3
      shell: bash
      run: |
        set -e
        cmake --build build --config Release --parallel \
          2>&1 | tee build-compile.log

    - name: List build output
      if: always()
      shell: bash
      run: |
        echo "=== build/vst3/ ==="
        ls -laR build/vst3/ 2>/dev/null || echo "(not found)"
        echo "=== All plugin files ==="
        find build -type f \( -name "*.vst3" -o -name "*.dll" \) 2>/dev/null || echo "(none)"

    # ── Run tests ────────────────────────────────────────────────────────────
    - name: Run CTest
      shell: bash
      run: ctest --test-dir build --output-on-failure --build-config Release

    # ── Validate with pluginval ──────────────────────────────────────────────
    - name: Download pluginval (Windows)
      shell: bash
      run: |
        curl -fsSL \
          https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip \
          -o pluginval.zip
        unzip -q pluginval.zip -d pluginval-tool

    - name: Locate VST3 file
      id: vst3-path
      shell: bash
      run: |
        VST3=$(find build -name "NeuroBoost.vst3" | head -1)
        [ -n "$VST3" ] || VST3=$(find build -name "NeuroBoost.dll" | head -1)
        [ -n "$VST3" ] || { echo "::error::No NeuroBoost.vst3 found"; exit 1; }
        echo "path=$VST3" >> "$GITHUB_OUTPUT"
        echo "Found VST3 at: $VST3"

    - name: Run pluginval
      shell: bash
      # WARP software DirectX renderer avoids GPU requirement in headless CI
      env:
        BGFX_DEFAULT_RENDERER: noop
      run: |
        mkdir -p pluginval-results
        ./pluginval-tool/pluginval.exe \
          --validate-in-process \
          --strictness-level 5 \
          --timeout-ms 120000 \
          --verbose \
          --output-dir ./pluginval-results \
          "${{ steps.vst3-path.outputs.path }}" \
          2>&1 | tee pluginval-results/pluginval-windows.log || true

    # ── UI screenshot note ───────────────────────────────────────────────────
    - name: UI screenshot note
      shell: bash
      run: |
        echo "ℹ️  Hardware GPU unavailable on Windows CI runner." >> "$GITHUB_STEP_SUMMARY"
        echo "   pluginval opens/closes the UI editor headlessly via DirectX WARP adapter." >> "$GITHUB_STEP_SUMMARY"
        echo "   test_ui_structure validates all UI component layout correctness." >> "$GITHUB_STEP_SUMMARY"

    # ── Package VST3 as ZIP ──────────────────────────────────────────────────
    - name: Package VST3 ZIP (Windows)
      shell: bash
      run: |
        set -e
        mkdir -p dist
        VST3="${{ steps.vst3-path.outputs.path }}"
        cp -r "$VST3" dist/NeuroBoost-windows-x64.vst3
        cd dist
        7z a -tzip NeuroBoost-windows-x64.vst3.zip NeuroBoost-windows-x64.vst3
        ls -lh

    # ── Upload artifacts ─────────────────────────────────────────────────────
    - name: Upload VST3 ZIP
      uses: actions/upload-artifact@v4
      with:
        name: NeuroBoost-vst3-windows
        path: dist/NeuroBoost-windows-x64.vst3.zip
        if-no-files-found: error

    - name: Upload pluginval logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pluginval-logs-windows
        path: pluginval-results/
        if-no-files-found: ignore

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-windows
        path: |
          build-configure.log
          build-compile.log
        if-no-files-found: ignore

    - name: Collect Windows crash dumps (WER)
      if: always()
      shell: bash
      run: |
        mkdir -p crash-dumps-windows
        # Windows Error Reporting stores dumps in these locations
        WER_DIRS=(
          "C:/Users/runneradmin/AppData/Local/Microsoft/Windows/WER/ReportQueue"
          "C:/ProgramData/Microsoft/Windows/WER/ReportQueue"
          "C:/Windows/Minidump"
        )
        for d in "${WER_DIRS[@]}"; do
          if [ -d "$d" ]; then
            find "$d" \( -name "*.dmp" -o -name "*.wer" \) \
                 -exec cp {} crash-dumps-windows/ \; 2>/dev/null || true
          fi
        done
        ls -la crash-dumps-windows/ || echo "(no crash dumps)"

    - name: Upload crash dumps
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: crash-dumps-windows
        path: crash-dumps-windows/
        if-no-files-found: ignore

