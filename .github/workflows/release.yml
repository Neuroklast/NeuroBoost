name: Release VST3

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version for this release (e.g. v0.2.0-alpha). Leave empty to build without creating a release.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-vst3:
    name: Build VST3 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    # ── Linux dependencies ──────────────────────────────────────────────────
    - name: Setup dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        set -e
        sudo apt-get update
        sudo apt-get install -y build-essential cmake git \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
          libgl1-mesa-dev libfreetype6-dev libharfbuzz-dev \
          libasound2-dev libgtk-3-dev pkg-config

    # ── macOS dependencies ──────────────────────────────────────────────────
    - name: Setup dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake || true

    # ── Clone iPlug2 + VST3 SDK ─────────────────────────────────────────────
    - name: Clone iPlug2 + VST3 SDK
      shell: bash
      run: |
        set -e
        mkdir -p deps
        git clone https://github.com/iPlug2/iPlug2.git deps/iPlug2
        cd deps/iPlug2
        git checkout 3b32d40f2b2da1f64ce2e5a6552f5bde7c76f2b1
        cd ../..

        # Clone VST3 SDK directly — more reliable than submodule init
        VST3_SDK_DIR="deps/iPlug2/Dependencies/IPlug/VST3_SDK"
        mkdir -p "$(dirname "$VST3_SDK_DIR")"
        rm -rf "$VST3_SDK_DIR"
        git clone --branch v3.7.7_build_19 --depth 1 \
          https://github.com/steinbergmedia/vst3sdk.git "$VST3_SDK_DIR"
        git -C "$VST3_SDK_DIR" submodule update --init --recursive

        # Verify
        VST3_HEADER="$VST3_SDK_DIR/pluginterfaces/vst/ivstaudioprocessor.h"
        if [ ! -f "$VST3_HEADER" ]; then
          echo "::error::VST3 SDK header not found: $VST3_HEADER"
          exit 1
        fi
        echo "✅ VST3 SDK ready at $VST3_HEADER"

    # ── Clone Visage ────────────────────────────────────────────────────────
    - name: Clone Visage
      shell: bash
      run: |
        set -e
        cd deps
        git clone https://github.com/VitalAudio/visage.git
        cd visage
        git checkout b0b2ee89abb3f1173dad4d80460197eb96afa724

    # ── Build Visage ────────────────────────────────────────────────────────
    - name: Build Visage
      shell: bash
      run: |
        set -e
        cd deps/visage
        mkdir -p build
        cd build
        cmake -DVISAGE_BUILD_EXAMPLES=OFF -DVISAGE_BUILD_TESTS=OFF -DCMAKE_BUILD_TYPE=Release ..
        cmake --build . --config Release --parallel 2

    # ── Verify all dependencies before configuring ──────────────────────────
    - name: Verify dependencies
      shell: bash
      run: |
        set -e
        echo "=== Verifying iPlug2 ==="
        if [ ! -d "deps/iPlug2" ]; then
          echo "::error::deps/iPlug2 not found"
          exit 1
        fi
        echo "✅ deps/iPlug2 found"

        echo "=== Verifying VST3 SDK ==="
        VST3_HEADER="deps/iPlug2/Dependencies/IPlug/VST3_SDK/pluginterfaces/vst/ivstaudioprocessor.h"
        if [ ! -f "$VST3_HEADER" ]; then
          echo "::error::VST3 SDK header not found: $VST3_HEADER"
          exit 1
        fi
        echo "✅ VST3 SDK header found"

        echo "=== Verifying Visage library ==="
        if [ "$RUNNER_OS" = "Windows" ]; then
          VISAGE_LIB=$(find deps/visage/build -name "visage.lib" 2>/dev/null | head -n 1)
          if [ -z "$VISAGE_LIB" ]; then
            # Also check for libvisage.a (MinGW/Ninja)
            VISAGE_LIB=$(find deps/visage/build -name "libvisage.a" 2>/dev/null | head -n 1)
          fi
        else
          VISAGE_LIB=$(find deps/visage/build -name "libvisage.a" 2>/dev/null | head -n 1)
        fi
        if [ -z "$VISAGE_LIB" ]; then
          echo "::error::Visage library not found under deps/visage/build/"
          find deps/visage/build -type f -name "*.a" -o -name "*.lib" 2>/dev/null || true
          exit 1
        fi
        echo "✅ Visage library found: $VISAGE_LIB"

    # ── Setup MSVC (Windows) ──────────────────────────────────────────────
    - name: Setup MSVC Developer Environment (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    # ── Configure NeuroBoost ────────────────────────────────────────────────
    - name: Configure NeuroBoost
      shell: bash
      run: |
        set -e
        mkdir -p build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_VST3=ON \
              -DBUILD_DSP_TEST=OFF \
              -DBUILD_UI_TEST=OFF \
              -DBUILD_STANDALONE=OFF \
              ..

    # ── Build NeuroBoost ────────────────────────────────────────────────────
    - name: Build NeuroBoost VST3
      shell: bash
      run: |
        set -e
        cd build
        cmake --build . --config Release --parallel 2

    # ── Debug: list what was built ──────────────────────────────────────────
    - name: Debug - List build output
      shell: bash
      run: |
        echo "=== build/vst3/ ==="
        ls -laR build/vst3/ 2>/dev/null || echo "build/vst3/ does not exist"
        echo "=== All plugin files ==="
        find build -type f \( -name "*.vst3" -o -name "*.dll" -o -name "*.so" -o -name "*.dylib" \) 2>/dev/null || echo "none found"

    # ── Package artifact ────────────────────────────────────────────────────
    - name: Package VST3 artifact (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -e
        mkdir -p dist
        # Linux VST3 output is a shared library (.so); fall back to .vst3 bundle name
        if [ -f build/vst3/NeuroBoost.so ]; then
          cp build/vst3/NeuroBoost.so dist/NeuroBoost-linux.so
        elif [ -d build/vst3/NeuroBoost.vst3 ] || [ -f build/vst3/NeuroBoost.vst3 ]; then
          cp -r build/vst3/NeuroBoost.vst3 dist/NeuroBoost-linux.vst3
        else
          echo "ERROR: No VST3 output found in build/vst3/"
          ls -laR build/vst3/ 2>/dev/null || echo "build/vst3/ does not exist"
          find build -type f \( -name "*.vst3" -o -name "*.so" -o -name "*.dylib" \) 2>/dev/null || echo "none found"
          exit 1
        fi
        ls -la dist/

    - name: Package VST3 artifact (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -e
        mkdir -p dist
        # macOS: try directory bundle first, then flat file
        VST3_PATH=$(find build -name "NeuroBoost.vst3" -type d | head -n 1)
        if [ -z "$VST3_PATH" ]; then
          VST3_PATH=$(find build -name "NeuroBoost.vst3" -type f | head -n 1)
        fi
        if [ -z "$VST3_PATH" ]; then
          VST3_PATH=$(find build -name "NeuroBoost.dylib" -type f | head -n 1)
        fi
        if [ -z "$VST3_PATH" ]; then
          echo "ERROR: No NeuroBoost.vst3 or .dylib found under build/"
          ls -laR build/vst3/ 2>/dev/null || echo "build/vst3/ does not exist"
          find build -type f \( -name "*.vst3" -o -name "*.dylib" -o -name "*.so" \) 2>/dev/null || echo "none found"
          exit 1
        fi
        echo "Found VST3 at: $VST3_PATH"
        cp -r "$VST3_PATH" dist/NeuroBoost-macos.vst3
        ls -la dist/

    - name: Package VST3 artifact (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        set -e
        mkdir -p dist
        # Windows: .vst3 is a file (renamed .dll), not a directory bundle
        VST3_PATH=$(find build -name "NeuroBoost.vst3" -type f | head -n 1)
        if [ -z "$VST3_PATH" ]; then
          VST3_PATH=$(find build -name "NeuroBoost.dll" -type f | head -n 1)
        fi
        if [ -z "$VST3_PATH" ]; then
          echo "ERROR: No NeuroBoost.vst3 or .dll found under build/"
          ls -laR build/vst3/ 2>/dev/null || echo "build/vst3/ does not exist"
          find build -type f \( -name "*.vst3" -o -name "*.dll" -o -name "*.so" \) 2>/dev/null || echo "none found"
          exit 1
        fi
        echo "Found VST3 at: $VST3_PATH"
        cp -r "$VST3_PATH" dist/NeuroBoost-windows.vst3
        ls -la dist/

    # ── Upload per-platform artifact ────────────────────────────────────────
    - name: Upload VST3 artifact
      uses: actions/upload-artifact@v4
      with:
        name: NeuroBoost-vst3-${{ matrix.os }}
        path: dist/
        if-no-files-found: error

  # ── Create GitHub Release and attach all artifacts ─────────────────────────
  release:
    name: Create GitHub Release
    needs: build-vst3
    runs-on: ubuntu-latest
    # Only create a release when triggered by a tag push, or when workflow_dispatch
    # provides an explicit tag input. Skip release creation for plain branch dispatches.
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')

    steps:
    - name: Resolve release tag
      id: tag
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
          echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
        else
          echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Download all VST3 artifacts
      uses: actions/download-artifact@v4.1.3
      with:
        path: release-artifacts/

    - name: List downloaded artifacts
      run: ls -laR release-artifacts/

    - name: Verify release artifacts are not empty
      shell: bash
      run: |
        set -e
        ARTIFACT_COUNT=$(find release-artifacts -type f 2>/dev/null | wc -l | tr -d '[:space:]')
        if [ "$ARTIFACT_COUNT" = "0" ]; then
          echo "::error::No files found in release-artifacts/ — build jobs failed or uploaded no artifacts"
          exit 1
        fi
        echo "✅ Found $ARTIFACT_COUNT release artifact(s):"
        find release-artifacts -type f

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.value }}
        name: NeuroBoost ${{ steps.tag.outputs.value }}
        draft: false
        prerelease: ${{ contains(steps.tag.outputs.value, '-alpha') || contains(steps.tag.outputs.value, '-beta') || contains(steps.tag.outputs.value, '-rc') }}
        files: release-artifacts/**/*
